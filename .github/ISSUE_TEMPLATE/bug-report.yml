name: Bug report
description: Create a report to help us improve
title: "[Bug]: "
labels: ["triage needed"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behaviour
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: dropdown
    id: environment-type
    attributes:
      label: Environment Type
      description: Where did you encounter this bug?
      options:
        - Desktop
        - Smartphone
        - Both
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System (OS)
      description: e.g. macOS 26.6, Windows 11, Android 16, iOS 19
    validations:
      required: false
  - type: input
    id: browser
    attributes:
      label: Browser & Version
      description: e.g. Chrome 122, Firefox 125, Safari 17
    validations:
      required: false
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      description: Please check the following boxes before submitting.
      options:
        - label: I have verified this bug exists on the latest version of WordGrid.
          required: true
        - label: I have searched existing issues to ensure this has not already been reported.
          required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        Please attach any relevant screenshots, logs, or other files that may help us understand and resolve the issue. You can drag and drop files into this issue.
