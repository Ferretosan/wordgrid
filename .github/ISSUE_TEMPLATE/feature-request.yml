name: Feature request
description: Suggest an idea for this project
title: "[Feature]: "
body:
  - type: dropdown
    id: feature-scope
    attributes:
      label: Feature Scope
      description: What area of the project does this feature primarily impact?
      options:
        - UI / Frontend
        - Backend / API
        - Documentation
        - Performance / Optimization
        - Other
    validations:
      required: true
  - type: textarea
    id: problem-relation
    attributes:
      label: Is your feature request related to a problem? Please describe.
      description: A clear and concise description of what the problem is.
      placeholder: I'm always frustrated when [...]
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.
    validations:
      required: false
  - type: dropdown
    id: importance
    attributes:
      label: How important is this feature?
      options:
        - Nice to have
        - Important (improves the game experience)
        - Very important (game-breaking or extremely unbalanced without it)
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context or screenshots about the feature request here.
    validations:
      required: false
